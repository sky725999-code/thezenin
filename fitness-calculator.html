<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 20px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        h1 { text-align: center; }
        input[type="number"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        input[type="submit"] { background: #28a745; color: #fff; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        input[type="submit"]:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fitness Calculator</h1>
        <form id="calculator">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" required>

            <label for="height">Height (cm):</label>
            <input type="number" id="height" required>

            <label for="age">Age:</label>
            <input type="number" id="age" required>

            <label for="gender">Gender:</label>
            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <input type="submit" value="Calculate">
        </form>
        <h2>Results:</h2>
        <div id="result"></div>
    </div>
    <script>
        document.getElementById('calculator').addEventListener('submit', function(event) {
            event.preventDefault();
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value) / 100;
            const age = parseInt(document.getElementById('age').value);
            const gender = document.getElementById('gender').value;

            // BMI Calculation
            const bmi = (weight / (height * height)).toFixed(2);

            // BMR Calculation
            let bmr;
            if (gender === 'male') {
                bmr = (10 * weight + 6.25 * (height * 100) - 5 * age + 5).toFixed(2);
            } else {
                bmr = (10 * weight + 6.25 * (height * 100) - 5 * age - 161).toFixed(2);
            }

            // Example TDEE Calculation (using a sedentary activity level)
            const tdee = (bmr * 1.2).toFixed(2);

            document.getElementById('result').innerHTML = `<p>BMI: ${bmi}</p><p>BMR: ${bmr}</p><p>TDEE (estimated): ${tdee}</p>`;
        });
    </script>
</body>
</html>
